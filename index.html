<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🔐 Gerador de Senhas</h1>

        <div class="senha-box">
            <input type="text" id="senha" readonly>
            <button id="copiar">Copiar</button>
        </div>

        <div class="opcoes">
            <label>
                Tamanho:
                <span id="valorTamanho">12</span>
            </label>
            <input type="range" id="tamanho" min="4" max="50" value="12">

            <label>
                <input type="checkbox" id="maiusculas" checked>
                Letras maiúsculas
            </label>

            <label>
                <input type="checkbox" id="minusculas" checked>
                Letras minúsculas
            </label>

            <label>
                <input type="checkbox" id="numeros" checked>
                Números
            </label>

            <label>
                <input type="checkbox" id="simbolos" checked>
                Símbolos
            </label>
        </div>

        <button id="gerar" class="btn-gerar">
            Gerar Senha
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
